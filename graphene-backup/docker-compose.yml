services:
  nordvpn:
    build: ../vpn-meshnet
    image: nordvpn-meshnet:local
    container_name: nordvpn-graphene
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    environment:
      - NORDVPN_TOKEN=${NORDVPN_TOKEN}
      - MESHNET_NICKNAME=${MESHNET_NICKNAME:-graphene-backup}
    ports:
      - "${HTTPS_PORT}:443"
    volumes:
      - nordvpn_data:/var/lib/nordvpn
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: caddy-webdav
    network_mode: "service:nordvpn"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nordvpn
      - rclone-webdav
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile --watch
    restart: unless-stopped

  rclone-webdav:
    image: rclone/rclone:latest
    container_name: rclone-webdav
    network_mode: "service:nordvpn"
    entrypoint: /bin/sh
    user: ${UID}:${GID}
    command:
      - -c
      - |
        rclone serve webdav /data/backups \
          --addr 0.0.0.0:8083 \
          --user "$$WEBDAV_USER" \
          --pass "$$WEBDAV_PASS" \
          --vfs-cache-mode writes
    env_file:
      - .env
    depends_on:
      - nordvpn
    volumes:
      - ./data:/data/backups
    restart: unless-stopped

  rclone-sync:
    image: rclone/rclone:latest
    container_name: rclone-sync
    entrypoint: /bin/sh
    user: ${UID}:${GID}
    command:
      - -c
      - |
        echo "Sync schedule: $$SYNC_SCHEDULE"
        echo "$$SYNC_SCHEDULE rclone sync /data/backups protondrive:$$PROTON_REMOTE_PATH --config /config/rclone/rclone.conf --log-level INFO 2>&1" > /var/spool/cron/crontabs/root
        crond -f -l 6
    env_file:
      - .env
    volumes:
      - ./data:/data/backups:ro
      - ./rclone.conf:/config/rclone/rclone.conf:ro
    restart: unless-stopped

volumes:
  nordvpn_data:
  caddy_data:
  caddy_config:
